spring.application.name=zove-backend

server.port=8080

spring.datasource.url=${ZOVE_DB_URL:jdbc:mysql://localhost:3306/zove_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${ZOVE_DB_USERNAME:root}
spring.datasource.password=${ZOVE_DB_PASSWORD:Abhi@1902}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

zove.frontend-url=http://localhost:5173
zove.cors.allowed-origins=${ZOVE_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,http://127.0.0.1:5173,http://127.0.0.1:5174}
zove.jwt.secret=${ZOVE_JWT_SECRET:zove-local-development-secret-change-before-deployment-2026}
zove.jwt.expiration-minutes=${ZOVE_JWT_EXPIRATION_MINUTES:1440}
zove.upload-dir=${ZOVE_UPLOAD_DIR:uploads}
