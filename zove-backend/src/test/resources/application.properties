spring.datasource.url=jdbc:h2:mem:zove_test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=false

zove.frontend-url=http://localhost:5173
zove.cors.allowed-origins=http://localhost:5173,http://localhost:5174,http://127.0.0.1:5173,http://127.0.0.1:5174
zove.jwt.secret=zove-test-secret-with-at-least-thirty-two-characters
zove.jwt.expiration-minutes=60
zove.upload-dir=target/test-uploads
